name: File processing problem
description: Report a file that failed to process correctly.
title: "[File problem]: "
labels: ["file-processing"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when a file could not be processed, downloaded, converted, merged, compressed, or cleaned.

        Do not upload private or sensitive files. Describe the file instead.

  - type: input
    id: tool
    attributes:
      label: Tool name
      placeholder: "Example: Remove PDF Metadata"
    validations:
      required: true

  - type: input
    id: file-type
    attributes:
      label: File type
      placeholder: "Example: PDF, SVG, PNG, CSV, DOCX"
    validations:
      required: true

  - type: input
    id: file-size
    attributes:
      label: Approximate file size
      placeholder: "Example: 800 KB, 12 MB, 95 MB"
    validations:
      required: false

  - type: dropdown
    id: file-source
    attributes:
      label: What kind of file was it?
      options:
        - Normal exported file
        - Scanned document
        - Image-heavy file
        - Password-protected or encrypted file
        - Form-based document
        - Generated by another app
        - Unknown
    validations:
      required: false

  - type: textarea
    id: issue
    attributes:
      label: What went wrong?
      placeholder: "The tool loaded forever, the output file was blank, the download failed, etc."
    validations:
      required: true

  - type: textarea
    id: safe-details
    attributes:
      label: Safe details
      description: Share details that do not reveal private data.
      placeholder: "Example: The PDF had 40 pages and many scanned images."
    validations:
      required: false
